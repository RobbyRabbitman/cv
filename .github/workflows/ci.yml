name: ci

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          # the full git history is required for nrwl/nx-set-shas@v4
          fetch-depth: 0

      - uses: nrwl/nx-set-shas@v4

      - run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm i

      - run: pnpm nx report --verbose

      - run: pnpm nx format:check

      - run: pnpm nx sync:check

      - run: pnpm nx affected -t lint lint-eslint typecheck typecheck-tsc -c ci

      - run: pnpm nx affected -t build build-tsc build-vite -c ci

      - run: pnpm nx affected -t test test-vitest -c ci

      - run: |
          pnpm nx affected -t sonar-scan -c ci \
            --option sonar.organization=robby-rabbitman-cv \
            --option sonar.token=${{ secrets.SONAR_TOKEN }} \
            --option sonar.pullrequest.key=${{ github.event.number }} \
            --option sonar.pullrequest.branch=${{ github.head_ref }} \
            --option sonar.pullrequest.base=${{ github.base_ref }} \
            --option sonar.qualitygate.wait=true \
            --option sonar.userHome=${{ runner.temp }}/.sonar

