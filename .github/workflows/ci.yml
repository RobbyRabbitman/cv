name: ci

on:
  pull_request:

concurrency:
  group: ${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  lint-pr-title:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      actions: read
      pull-requests: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - run: corepack enable

      - run: pnpm i

      - run: pnpm nx run @robby-rabbitman/cv-tools-commitlint:commitlint
        env:
          CV_TOOLS_COMMITLINT_TEXT: ${{ github.event.pull_request.title }}

  ci:
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          # the full git history is required for nrwl/nx-set-shas@v4
          fetch-depth: 0

      - uses: nrwl/nx-set-shas@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - run: corepack enable

      - run: pnpm i

      - run: pnpm nx report --verbose

      - run: pnpm nx format:check

      - run: pnpm nx sync:check

      - run: pnpm nx affected -t lint typecheck typecheck-tsc -c ci

      - run: pnpm nx affected -t build build-tsc build-vite -c ci

      - run: pnpm nx affected -t test test-vitest -c ci
