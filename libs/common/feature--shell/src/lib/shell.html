<header class="flex p-4 gap-4 items-center container">
  <cv-common--shell-logo />
  <cv-common-smart--theme-select class="ml-auto" />
  <cv-i18n-smart--locale-select />
  @if (user.value()) {
  <cv-auth-smart--sign-out-button />
  } @else {
  <cv-auth-smart--sign-in-button />
  }
</header>
<main class="container flex flex-col gap-4">
  <router-outlet />
  <cv-smart--create-cv-button />
  <span class="flex flex-wrap gap-16">
    @for (cv of cv.cvEntities(); track cv.id) {
    <cv-smart--card [cvId]="cv.id" />
    }
  </span>
</main>
<footer class="container"></footer>
